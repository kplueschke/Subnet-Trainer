<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Guess-Who</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-bubble { max-width: 80%; padding: 0.75rem 1rem; border-radius: 1rem; margin-bottom: 0.5rem; word-wrap: break-word; }
        .chat-user { background: #3b82f6; color: white; border-bottom-right-radius: 0; align-self: flex-end; }
        .chat-ai { background: #334155; color: #f8fafc; border-bottom-left-radius: 0; align-self: flex-start; border: 1px solid #475569; }
        .chat-error { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; border-bottom-left-radius: 0; align-self: flex-start; }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col">
    <div class="container mx-auto px-4 py-8 max-w-4xl flex-grow flex flex-col">
        <div class="mb-6 flex items-center justify-between">
            <a href="englisch.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-900 hover:bg-slate-700 text-gray-400 transition-colors border border-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Zurück
            </button>
            <h1 class="text-2xl font-bold text-white">Hardware Guess-Who</h1>
        </div>

        <div class="glass-card rounded-2xl p-4 flex-grow flex flex-col mb-4 overflow-hidden relative">

            <div id="start-overlay" class="absolute inset-0 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center z-20">
                <h2 class="text-3xl font-bold text-teal-400 mb-4">Wer bin ich? (Hardware)</h2>
                <p class="text-gray-400 mb-6 max-w-md text-center">Ich habe mir eine IT-Komponente ausgedacht. Stelle grammatikalisch korrekte englische Ja/Nein-Fragen (z.B. "Does it...", "Is it..."), um sie zu erraten!</p>
                <button id="start-btn" class="px-8 py-3 bg-teal-600 hover:bg-teal-500 text-white font-bold rounded-xl transition-colors">Start Game</button>
            </div>

            <div class="flex items-center justify-between border-b border-gray-700 pb-2 mb-4">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">🤖</div>
                    <div>
                        <h3 class="font-bold text-white">Hardware-KI</h3>
                        <div class="text-xs text-teal-400 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-teal-400 animate-pulse"></span> Online</div>
                    </div>
                </div>
                <div class="text-sm text-gray-500">Versuche: <span id="attempts">0</span>/10</div>
            </div>

            <div id="chat-box" class="flex-grow flex flex-col overflow-y-auto mb-4 space-y-2 pr-2">
                <!-- Chat messages appended here -->
            </div>

            <div class="flex gap-2">
                <input type="text" id="chat-input" class="flex-grow bg-gray-900 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 transition-colors" placeholder="Ask a yes/no question in English..." disabled>
                <button id="send-btn" class="px-6 py-2 bg-teal-600 hover:bg-teal-500 text-white font-bold rounded-xl transition-colors disabled:opacity-50" disabled>Send</button>
            </div>
            <div class="text-xs text-slate-500 mt-2 text-center">To guess the item, type: "Is it a [name]?"</div>
        </div>
    </div>

    <script>
        const hardwareDb = [
            { name: "CPU", attr: { compute: true, storage: false, network: false, volatile: true, input: false, output: false, internal: true } },
            { name: "RAM", attr: { compute: false, storage: true, network: false, volatile: true, input: false, output: false, internal: true } },
            { name: "SSD", attr: { compute: false, storage: true, network: false, volatile: false, input: false, output: false, internal: true } },
            { name: "Switch", attr: { compute: false, storage: false, network: true, volatile: false, input: false, output: false, internal: false } },
            { name: "Monitor", attr: { compute: false, storage: false, network: false, volatile: false, input: false, output: true, internal: false } },
            { name: "Keyboard", attr: { compute: false, storage: false, network: false, volatile: false, input: true, output: false, internal: false } }
        ];

        let targetDevice = null;
        let attempts = 0;
        let isPlaying = false;

        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const attemptsEl = document.getElementById('attempts');
        const startBtn = document.getElementById('start-btn');
        const startOverlay = document.getElementById('start-overlay');

        function startGame() {
            startOverlay.classList.add('hidden');
            targetDevice = hardwareDb[Math.floor(Math.random() * hardwareDb.length)];
            attempts = 0;
            isPlaying = true;
            chatBox.innerHTML = '';
            attemptsEl.innerText = attempts;
            chatInput.disabled = false;
            sendBtn.disabled = false;

            addMessage("I've picked an IT component. Ask me yes/no questions to find out what it is!", 'ai');
            chatInput.focus();
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            if(sender === 'user') div.className = 'chat-bubble chat-user';
            else if (sender === 'ai') div.className = 'chat-bubble chat-ai';
            else if (sender === 'error') div.className = 'chat-bubble chat-error';

            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function processInput() {
            if(!isPlaying) return;
            let text = chatInput.value.trim();
            if(!text) return;

            addMessage(text, 'user');
            chatInput.value = '';
            attempts++;
            attemptsEl.innerText = attempts;

            text = text.toLowerCase();

            // Basic grammar check
            if(!text.startsWith("does ") && !text.startsWith("is ") && !text.startsWith("can ") && !text.startsWith("has ")) {
                setTimeout(() => addMessage("Grammar check failed: Please start your yes/no question with 'Is', 'Does', 'Can', or 'Has'.", 'error'), 500);
                return;
            }
            if(!text.endsWith("?")) {
                setTimeout(() => addMessage("Grammar check failed: Questions must end with a question mark '?'.", 'error'), 500);
                return;
            }

            // Guessing the item directly
            const guessMatch = text.match(/is it (a|an|the)?\s*([a-z]+)\s*\?/);
            if(guessMatch) {
                const guessedName = guessMatch[2];
                if(guessedName === targetDevice.name.toLowerCase()) {
                    setTimeout(() => {
                        addMessage(`Yes! It is the ${targetDevice.name}. You won in ${attempts} attempts!`, 'ai');
                        endGame();
                    }, 500);
                } else {
                    setTimeout(() => addMessage(`No, it is not a ${guessedName}.`, 'ai'), 500);
                }
            } else {
                // Asking properties
                setTimeout(() => answerQuestion(text), 500);
            }

            if(attempts >= 10 && isPlaying) {
                setTimeout(() => {
                    addMessage(`You've reached the maximum number of attempts! It was the ${targetDevice.name}.`, 'ai');
                    endGame();
                }, 1000);
            }
        }

        function answerQuestion(q) {
            const attr = targetDevice.attr;
            let answer = "I don't understand the question. Try asking about storage, compute, network, internal/external, or input/output.";
            let found = false;

            if(q.includes("store") || q.includes("memory") || q.includes("save data")) {
                answer = attr.storage ? "Yes, it stores data." : "No, it does not store data.";
                found = true;
            } else if(q.includes("process") || q.includes("compute") || q.includes("calculate")) {
                answer = attr.compute ? "Yes, it processes data." : "No, it does not process data.";
                found = true;
            } else if(q.includes("network") || q.includes("connect") || q.includes("internet")) {
                answer = attr.network ? "Yes, it connects devices to a network." : "No, it does not manage networks.";
                found = true;
            } else if(q.includes("volatile") || q.includes("lose data") || q.includes("power off")) {
                // if it stores data, check volatile. If not, not really applicable
                if(attr.storage) {
                    answer = attr.volatile ? "Yes, it loses data when powered off (volatile)." : "No, it retains data permanently (non-volatile).";
                } else {
                    answer = "No, it doesn't store data in that way.";
                }
                found = true;
            } else if(q.includes("input") || q.includes("type") || q.includes("enter data")) {
                answer = attr.input ? "Yes, it is an input device." : "No, it is not an input device.";
                found = true;
            } else if(q.includes("output") || q.includes("display") || q.includes("show")) {
                answer = attr.output ? "Yes, it is an output device." : "No, it is not an output device.";
                found = true;
            } else if(q.includes("inside") || q.includes("internal") || q.includes("case") || q.includes("motherboard")) {
                answer = attr.internal ? "Yes, it is typically installed inside the computer case." : "No, it is an external device.";
                found = true;
            }

            addMessage(answer, found ? 'ai' : 'error');
        }

        function endGame() {
            isPlaying = false;
            chatInput.disabled = true;
            sendBtn.disabled = true;
            setTimeout(() => {
                startOverlay.classList.remove('hidden');
                startOverlay.querySelector('h2').innerText = "Spiel beendet";
                startBtn.innerText = "Nochmal spielen";
            }, 3000);
        }

        sendBtn.addEventListener('click', processInput);
        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') processInput();
        });
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
