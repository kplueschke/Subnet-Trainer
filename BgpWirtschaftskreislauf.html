<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtschaftskreislauf-Interaktor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Using vis-network for interactive flowcharting -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b, #0f172a);
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #network-container {
            width: 100%;
            height: 600px;
            border: none;
        }
        /* Custom vis-network tooltip styling */
        div.vis-tooltip {
            background-color: #1e293b !important;
            border: 1px solid #475569 !important;
            color: #f8fafc !important;
            border-radius: 0.5rem !important;
            padding: 0.75rem !important;
            font-family: 'Inter', sans-serif !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">
    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10 flex-grow flex flex-col">
        <div class="mb-8 flex-shrink-0">
            <a href="bgp.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors border border-slate-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Zurück zu BGP
            </a>
        </div>

        <div class="text-center mb-8 flex-shrink-0">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-red-500">
                Erweiterter Wirtschaftskreislauf
            </h1>
            <p class="mt-4 text-slate-300">Klicke auf die Ströme (Pfeile) oder Akteure, um mehr über die Geld- und Güterströme zu erfahren.</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow">
            <!-- Graph container -->
            <div class="glass-card rounded-3xl p-2 w-full lg:w-2/3 flex-grow bg-slate-900/50">
                <div class="w-full flex justify-end gap-4 p-2 text-sm">
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500"></div> Geldstrom</span>
                    <span class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-blue-500"></div> Güterstrom</span>
                </div>
                <div id="network-container"></div>
            </div>

            <!-- Detail Sidebar -->
            <div class="glass-card rounded-3xl p-6 w-full lg:w-1/3 flex flex-col">
                <h3 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">Details</h3>
                <div id="detail-view" class="text-slate-300 space-y-4">
                    <div class="flex items-center justify-center h-48 text-slate-500 italic">
                        Wähle ein Element im Diagramm aus.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Nodes representing economic actors
        const nodes = new vis.DataSet([
            { id: 1, label: 'Haushalte', shape: 'box', color: { background: '#334155', border: '#475569' }, font: { color: 'white', size: 18 } },
            { id: 2, label: 'Unternehmen', shape: 'box', color: { background: '#334155', border: '#475569' }, font: { color: 'white', size: 18 } },
            { id: 3, label: 'Staat', shape: 'box', color: { background: '#334155', border: '#475569' }, font: { color: 'white', size: 18 } },
            { id: 4, label: 'Banken\n(Kapitalsammelstellen)', shape: 'box', color: { background: '#334155', border: '#475569' }, font: { color: 'white', size: 16 } },
            { id: 5, label: 'Ausland', shape: 'box', color: { background: '#334155', border: '#475569' }, font: { color: 'white', size: 18 } }
        ]);

        // Edges representing flows
        // Green: Money flow (#22c55e)
        // Blue: Goods/Service flow (#3b82f6)
        const edges = new vis.DataSet([
            // Haushalt <-> Unternehmen
            { from: 1, to: 2, color: { color: '#3b82f6' }, label: 'Produktionsfaktoren\n(Arbeit, Boden, Kapital)', arrows: 'to', title: 'Güterstrom: Haushalte stellen Unternehmen ihre Arbeitskraft zur Verfügung.' },
            { from: 2, to: 1, color: { color: '#22c55e' }, label: 'Einkommen\n(Lohn, Miete, Zins)', arrows: 'to', title: 'Geldstrom: Unternehmen zahlen Löhne an die Haushalte.' },
            { from: 2, to: 1, color: { color: '#3b82f6' }, label: 'Konsumgüter\n& Dienstleistungen', arrows: 'to', title: 'Güterstrom: Unternehmen verkaufen Produkte an Haushalte.' },
            { from: 1, to: 2, color: { color: '#22c55e' }, label: 'Konsumausgaben', arrows: 'to', title: 'Geldstrom: Haushalte bezahlen die gekauften Produkte.' },

            // Staat
            { from: 1, to: 3, color: { color: '#22c55e' }, label: 'Steuern', arrows: 'to' },
            { from: 3, to: 1, color: { color: '#22c55e' }, label: 'Transfers\n(z.B. Kindergeld)', arrows: 'to' },
            { from: 2, to: 3, color: { color: '#22c55e' }, label: 'Steuern', arrows: 'to' },
            { from: 3, to: 2, color: { color: '#22c55e' }, label: 'Subventionen', arrows: 'to' },

            // Banken
            { from: 1, to: 4, color: { color: '#22c55e' }, label: 'Sparen', arrows: 'to' },
            { from: 4, to: 2, color: { color: '#22c55e' }, label: 'Kredite\n(Investitionen)', arrows: 'to' },

            // Ausland
            { from: 2, to: 5, color: { color: '#3b82f6' }, label: 'Export (Güter)', arrows: 'to' },
            { from: 5, to: 2, color: { color: '#22c55e' }, label: 'Export-Erlöse', arrows: 'to' },
            { from: 5, to: 2, color: { color: '#3b82f6' }, label: 'Import (Güter)', arrows: 'to' },
            { from: 2, to: 5, color: { color: '#22c55e' }, label: 'Import-Ausgaben', arrows: 'to' }
        ]);

        const container = document.getElementById('network-container');
        const data = { nodes: nodes, edges: edges };
        const options = {
            physics: {
                solver: 'forceAtlas2Based',
                forceAtlas2Based: {
                    gravitationalConstant: -100,
                    centralGravity: 0.01,
                    springLength: 200,
                    springConstant: 0.08
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200
            },
            edges: {
                font: {
                    color: '#94a3b8',
                    size: 12,
                    background: '#0f172a',
                    strokeWidth: 0
                },
                smooth: { type: 'curvedCW', roundness: 0.2 }
            }
        };

        const network = new vis.Network(container, data, options);

        const detailView = document.getElementById('detail-view');

        // Interaction events
        network.on("selectNode", function (params) {
            const nodeId = params.nodes[0];
            const node = nodes.get(nodeId);

            let description = "";
            switch(nodeId) {
                case 1: description = "Stellen Produktionsfaktoren zur Verfügung, erzielen Einkommen, konsumieren Güter und sparen."; break;
                case 2: description = "Produzieren Güter und Dienstleistungen, fragen Produktionsfaktoren nach, investieren."; break;
                case 3: description = "Zieht Steuern ein, leistet Transferzahlungen an Haushalte und Subventionen an Unternehmen."; break;
                case 4: description = "Sammeln Spargelder und vergeben Kredite (z.B. für Investitionen der Unternehmen)."; break;
                case 5: description = "Umfasst alle Transaktionen (Exporte/Importe) über die Landesgrenzen hinaus."; break;
            }

            detailView.innerHTML = `
                <h4 class="text-2xl font-bold text-white">${node.label.replace('\n', ' ')}</h4>
                <div class="inline-block px-2 py-1 bg-slate-800 rounded text-xs mt-2">Akteur</div>
                <p class="mt-4 leading-relaxed">${description}</p>
            `;
        });

        network.on("selectEdge", function (params) {
            // Only trigger if no node is selected to prioritize node clicks
            if(params.nodes.length > 0) return;

            const edgeId = params.edges[0];
            const edge = edges.get(edgeId);
            const isMoney = edge.color.color === '#22c55e';

            detailView.innerHTML = `
                <h4 class="text-xl font-bold text-white">${edge.label.replace('\n', ' ')}</h4>
                <div class="inline-block px-2 py-1 ${isMoney ? 'bg-green-500/20 text-green-400' : 'bg-blue-500/20 text-blue-400'} rounded text-xs mt-2 font-bold">
                    ${isMoney ? 'Geldstrom' : 'Güterstrom'}
                </div>
                <div class="mt-4 text-sm text-slate-300 border-l-2 ${isMoney ? 'border-green-500' : 'border-blue-500'} pl-3">
                    Von: ${nodes.get(edge.from).label.replace('\n', ' ')} <br>
                    Zu: ${nodes.get(edge.to).label.replace('\n', ' ')}
                </div>
            `;
        });

        network.on("deselectNode", function () {
            if(network.getSelectedEdges().length === 0) {
                resetDetail();
            }
        });

        network.on("deselectEdge", function () {
             if(network.getSelectedNodes().length === 0) {
                resetDetail();
            }
        });

        function resetDetail() {
            detailView.innerHTML = `<div class="flex items-center justify-center h-48 text-slate-500 italic">Wähle ein Element im Diagramm aus.</div>`;
        }
    </script>
</body>
</html>
