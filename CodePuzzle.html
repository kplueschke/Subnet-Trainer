<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-Snippet-Puzzle - AP Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at top, #111111, #000000);
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .snippet {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        .snippet:active {
            cursor: grabbing;
        }
        .snippet.dragging {
            opacity: 0.8;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            background-color: rgba(30, 41, 59, 0.95);
        }
        .drag-over {
            border-top: 2px solid #eab308; /* Yellow-500 */
        }
        .correct-animation {
            animation: pulse-green 1.5s ease-in-out;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full bg-black/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="ap.html" class="p-2 rounded-lg bg-gray-900 hover:bg-slate-700 text-gray-400 transition-colors border border-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </a>
                <h1 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="text-yellow-400">🧩</span> Code-Snippet-Puzzle
                </h1>
            </div>
            <div class="text-sm text-gray-400">Algorithmus-Training</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8 flex flex-col gap-6">

        <!-- Controls -->
        <div class="glass-card rounded-3xl p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-xl font-bold text-white mb-1">Aufgabe: Bubble Sort</h2>
                <p class="text-sm text-gray-400">Bringe die Codezeilen in die richtige Reihenfolge, um ein C#-Array zu sortieren.</p>
            </div>
            <div class="flex gap-3">
                <button id="checkBtn" class="bg-yellow-600 hover:bg-yellow-500 text-white font-medium py-2 px-6 rounded-lg transition-colors flex items-center gap-2 shadow-lg shadow-yellow-600/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Prüfen
                </button>
                <button id="resetBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-medium py-2 px-4 rounded-lg transition-colors border border-slate-600">
                    Neu mischen
                </button>
            </div>
        </div>

        <!-- Feedback Area -->
        <div id="feedbackArea" class="hidden rounded-xl p-4 text-center font-medium border">
            <!-- Content injected via JS -->
        </div>

        <!-- Puzzle Container -->
        <div class="glass-card rounded-3xl p-6 bg-[#0d1117] border-gray-700">
            <div class="text-sm text-slate-500 mono mb-4 border-b border-gray-800 pb-2">
                <span class="text-blue-400">void</span> <span class="text-yellow-200">BubbleSort</span>(<span class="text-blue-400">int</span>[] arr)<br>{
            </div>

            <div id="puzzleContainer" class="flex flex-col gap-2 min-h-[300px]">
                <!-- Snippets will be rendered here -->
            </div>

            <div class="text-sm text-slate-500 mono mt-4 border-t border-gray-800 pt-2">
                }
            </div>
        </div>

    </main>

    <script>
        // Data Structure
        const correctOrder = [
            { id: 'l1', indent: 1, html: `<span class="text-blue-400">int</span> n = arr.Length;` },
            { id: 'l2', indent: 1, html: `<span class="text-blue-400">for</span> (<span class="text-blue-400">int</span> i = <span class="text-orange-300">0</span>; i < n - <span class="text-orange-300">1</span>; i++)` },
            { id: 'l3', indent: 1, html: `{` },
            { id: 'l4', indent: 2, html: `<span class="text-blue-400">for</span> (<span class="text-blue-400">int</span> j = <span class="text-orange-300">0</span>; j < n - i - <span class="text-orange-300">1</span>; j++)` },
            { id: 'l5', indent: 2, html: `{` },
            { id: 'l6', indent: 3, html: `<span class="text-purple-400">if</span> (arr[j] > arr[j + <span class="text-orange-300">1</span>])` },
            { id: 'l7', indent: 3, html: `{` },
            { id: 'l8', indent: 4, html: `<span class="text-blue-400">int</span> temp = arr[j];` },
            { id: 'l9', indent: 4, html: `arr[j] = arr[j + <span class="text-orange-300">1</span>];` },
            { id: 'l10', indent: 4, html: `arr[j + <span class="text-orange-300">1</span>] = temp;` },
            { id: 'l11', indent: 3, html: `}` },
            { id: 'l12', indent: 2, html: `}` },
            { id: 'l13', indent: 1, html: `}` }
        ];

        // DOM Elements
        const container = document.getElementById('puzzleContainer');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const feedbackArea = document.getElementById('feedbackArea');

        let draggedItem = null;

        // Init
        function initPuzzle() {
            container.innerHTML = '';
            feedbackArea.classList.add('hidden');

            // Shuffle
            let shuffled = [...correctOrder].sort(() => Math.random() - 0.5);

            shuffled.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'snippet flex items-center bg-gray-900/80 border border-gray-700 rounded p-3 text-sm mono select-none';
                el.draggable = true;
                el.dataset.id = item.id;

                // Add grip icon and indentation based on shuffled state, but we'll render it flat initially to make it harder,
                // or keep indentation as a hint. Let's keep indentation as a hint.
                const indentSpace = '&nbsp;&nbsp;&nbsp;&nbsp;'.repeat(item.indent);

                el.innerHTML = `
                    <div class="mr-3 text-slate-500 cursor-grab">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg>
                    </div>
                    <div class="flex-grow text-gray-400">
                        ${indentSpace}${item.html}
                    </div>
                `;

                // Drag Events
                el.addEventListener('dragstart', handleDragStart);
                el.addEventListener('dragend', handleDragEnd);
                el.addEventListener('dragover', handleDragOver);
                el.addEventListener('dragenter', handleDragEnter);
                el.addEventListener('dragleave', handleDragLeave);
                el.addEventListener('drop', handleDrop);

                container.appendChild(el);
            });
        }

        // Drag and Drop Handlers
        function handleDragStart(e) {
            draggedItem = this;
            setTimeout(() => this.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            draggedItem = null;
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            e.preventDefault();
            if (this !== draggedItem) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave() {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.stopPropagation();
            if (this !== draggedItem) {
                this.classList.remove('drag-over');

                // Determine insertion point (before or after)
                const bounding = this.getBoundingClientRect();
                const offset = bounding.y + (bounding.height / 2);

                if (e.clientY - offset > 0) {
                    this.parentNode.insertBefore(draggedItem, this.nextSibling);
                } else {
                    this.parentNode.insertBefore(draggedItem, this);
                }
            }
            return false;
        }

        // Logic
        function checkOrder() {
            const currentItems = Array.from(container.children);
            let isCorrect = true;
            let firstWrongIndex = -1;

            currentItems.forEach((el, index) => {
                // Reset styles
                el.classList.remove('border-red-500/50', 'bg-red-900/20');

                if (el.dataset.id !== correctOrder[index].id) {
                    isCorrect = false;
                    if (firstWrongIndex === -1) firstWrongIndex = index;
                    el.classList.add('border-red-500/50', 'bg-red-900/20');
                }
            });

            feedbackArea.classList.remove('hidden');

            if (isCorrect) {
                feedbackArea.className = 'rounded-xl p-4 text-center font-bold border bg-green-500/20 text-green-400 border-green-500/30 correct-animation';
                feedbackArea.innerHTML = '🎉 Perfekt! Der Algorithmus ist korrekt zusammengesetzt.';
            } else {
                feedbackArea.className = 'rounded-xl p-4 text-center font-medium border bg-red-500/20 text-red-400 border-red-500/30';
                feedbackArea.innerHTML = `Fehler gefunden ab Zeile ${firstWrongIndex + 1}. Bitte überprüfe die Reihenfolge.`;
            }
        }

        // Event Listeners
        checkBtn.addEventListener('click', checkOrder);
        resetBtn.addEventListener('click', initPuzzle);

        // Start
        initPuzzle();
    </script>
</body>
</html>
