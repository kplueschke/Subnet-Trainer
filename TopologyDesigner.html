<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN/WAN-Topologie-Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overscroll-behavior: none;
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 600px;
            background-color: #0f172a;
            background-image:
                radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        #lines-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .node {
            position: absolute;
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid #475569;
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: grab;
            z-index: 20;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            min-width: 120px;
        }

        .node:active { cursor: grabbing; }

        .node .icon { font-size: 2rem; line-height: 1; }
        .node .label { font-weight: bold; color: white; font-size: 0.875rem; text-align: center; }
        .node .ip { font-family: 'Fira Code', monospace; color: #60a5fa; font-size: 0.75rem; }

        /* Connector points */
        .conn-point {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #cbd5e1;
            border-radius: 50%;
            border: 3px solid #0f172a;
            cursor: crosshair;
            z-index: 30;
            transition: transform 0.1s;
        }
        .conn-point:hover { transform: scale(1.3); background: #3b82f6; }

        /* Layouts */
        .conn-top { top: -7px; left: 50%; transform: translateX(-50%); }
        .conn-bottom { bottom: -7px; left: 50%; transform: translateX(-50%); }
        .conn-left { left: -7px; top: 50%; transform: translateY(-50%); }
        .conn-right { right: -7px; top: 50%; transform: translateY(-50%); }

        .conn-point:hover.conn-top, .conn-point:hover.conn-bottom { transform: translateX(-50%) scale(1.3); }
        .conn-point:hover.conn-left, .conn-point:hover.conn-right { transform: translateY(-50%) scale(1.3); }

        /* Types */
        .node.wan { border-color: #a855f7; } /* Purple Internet/Cloud */
        .node.router { border-color: #ef4444; } /* Red Routers */
        .node.switch { border-color: #3b82f6; } /* Blue Switches */
        .node.end { border-color: #10b981; } /* Green End devices */

    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <a href="its.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Zurück
            </a>
            <div class="flex gap-4">
                <button id="btn-clear-lines" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-lg transition-colors text-sm">
                    Kabel entfernen
                </button>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-red-500 mb-4">
                LAN/WAN-Topologie-Designer
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto">
                Baue das Unternehmensnetzwerk auf. Ziehe die Geräte (Drag & Drop) und verbinde sie über ihre Ports, um LANs und WANs logisch zu verknüpfen.
            </p>
        </div>

        <div class="glass-card rounded-2xl p-4 lg:p-6 mx-auto w-full max-w-6xl">
            <div class="flex gap-4 mb-4 text-sm">
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-purple-500"></span> WAN / Cloud</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-red-500"></span> Router (Layer 3)</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-500"></span> Switch (Layer 2)</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-500"></span> Endgeräte</div>
            </div>

            <div id="canvas-container">
                <canvas id="lines-canvas"></canvas>
                <!-- Nodes generated by JS -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full text-center py-6 border-t border-slate-900 text-xs text-slate-600 mono mt-8">
        &copy; 2026 kplueschke All rights reserved.
    </footer>

    <script>
        const initialNodes = [
            // WAN
            { id: 'inet', type: 'wan', label: 'Internet', icon: '☁️', ip: 'Public IP', x: 45, y: 10 },
            { id: 'vpn', type: 'wan', label: 'MPLS / VPN', icon: '🔐', ip: 'Provider', x: 80, y: 30 },

            // HQ (Zentrale)
            { id: 'r1', type: 'router', label: 'HQ Router', icon: '🔴', ip: '10.0.0.1/24', x: 45, y: 30 },
            { id: 's1', type: 'switch', label: 'Core Switch', icon: '🔵', ip: 'VLAN 10,20', x: 45, y: 55 },
            { id: 'srv', type: 'end', label: 'Server Farm', icon: '🗄️', ip: '10.0.10.10', x: 30, y: 80 },
            { id: 'pc1', type: 'end', label: 'HQ Client', icon: '💻', ip: '10.0.20.50', x: 60, y: 80 },

            // Branch (Außenstelle)
            { id: 'r2', type: 'router', label: 'Branch Router', icon: '🔴', ip: '10.1.0.1/24', x: 80, y: 55 },
            { id: 'pc2', type: 'end', label: 'Branch Client', icon: '💻', ip: '10.1.0.50', x: 80, y: 80 },

            // Home Office
            { id: 'r3', type: 'router', label: 'Home Router', icon: '🏠', ip: '192.168.1.1', x: 10, y: 30 },
            { id: 'lap', type: 'end', label: 'Home Laptop', icon: '💻', ip: '192.168.1.20', x: 10, y: 60 }
        ];

        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('lines-canvas');
        const ctx = canvas.getContext('2d');

        let connections = []; // { id: 'uuid', fromNode, fromPt, toNode, toPt }

        // State for drag and drop (Nodes)
        let draggedNode = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // State for drawing lines
        let isDrawingLine = false;
        let startConnPoint = null;
        let startNodeId = null;
        let mouseX = 0;
        let mouseY = 0;

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawLines();
        }
        window.addEventListener('resize', resizeCanvas);

        function init() {
            container.querySelectorAll('.node').forEach(n => n.remove());

            initialNodes.forEach(n => {
                const el = document.createElement('div');
                el.className = `node ${n.type}`;
                el.id = n.id;

                // Position (convert % to px loosely based on initial container size for free dragging)
                // Using percentages for initial placement looks better responsively
                el.style.left = `calc(${n.x}% - 60px)`;
                el.style.top = `${n.y}%`;

                el.innerHTML = `
                    <div class="icon">${n.icon}</div>
                    <div class="label">${n.label}</div>
                    <div class="ip">${n.ip}</div>
                `;

                // Add connection points
                const pts = ['conn-top', 'conn-right', 'conn-bottom', 'conn-left'];
                pts.forEach(pos => {
                    const pt = document.createElement('div');
                    pt.className = `conn-point ${pos}`;
                    pt.dataset.node = n.id;
                    pt.dataset.pos = pos;

                    // Events for line drawing
                    pt.addEventListener('mousedown', handleConnMouseDown);
                    pt.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        handleConnMouseDown(e.touches[0], pt);
                    }, {passive: false});

                    el.appendChild(pt);
                });

                // Node drag events
                el.addEventListener('mousedown', handleNodeMouseDown);
                el.addEventListener('touchstart', (e) => {
                    if (e.target.classList.contains('conn-point')) return; // handled by pt
                    e.preventDefault();
                    handleNodeMouseDown(e.touches[0], el);
                }, {passive: false});

                container.appendChild(el);
            });

            resizeCanvas();
        }

        // --- Node Dragging Logic ---
        function handleNodeMouseDown(e, elOverride) {
            if (e.target.classList.contains('conn-point')) return; // Ignore if clicking a connection point

            draggedNode = elOverride || this;

            const rect = draggedNode.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            // Calculate offset relative to node's top left
            const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
            const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;

            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;

            draggedNode.style.zIndex = 100;
        }

        // --- Line Drawing Logic ---
        function handleConnMouseDown(e, elOverride) {
            e.stopPropagation(); // Don't trigger node drag
            isDrawingLine = true;
            startConnPoint = elOverride || this;
            startNodeId = startConnPoint.dataset.node;
            updateMousePos(e);
        }

        function updateMousePos(e) {
            const rect = container.getBoundingClientRect();
            const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
            const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            mouseX = clientX - rect.left;
            mouseY = clientY - rect.top;
        }

        // Global Move
        window.addEventListener('mousemove', (e) => {
            if (draggedNode) {
                const rect = container.getBoundingClientRect();
                let newX = e.clientX - rect.left - dragOffsetX;
                let newY = e.clientY - rect.top - dragOffsetY;

                // Boundaries
                newX = Math.max(0, Math.min(newX, rect.width - draggedNode.offsetWidth));
                newY = Math.max(0, Math.min(newY, rect.height - draggedNode.offsetHeight));

                draggedNode.style.left = `${newX}px`;
                draggedNode.style.top = `${newY}px`;

                drawLines();
            } else if (isDrawingLine) {
                updateMousePos(e);
                drawLines(); // draws finalized lines
                drawTempLine(); // draws the current active line
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (draggedNode || isDrawingLine) {
                e.preventDefault(); // prevent scroll
                if (draggedNode) {
                    const rect = container.getBoundingClientRect();
                    const touch = e.touches[0];
                    let newX = touch.clientX - rect.left - dragOffsetX;
                    let newY = touch.clientY - rect.top - dragOffsetY;

                    newX = Math.max(0, Math.min(newX, rect.width - draggedNode.offsetWidth));
                    newY = Math.max(0, Math.min(newY, rect.height - draggedNode.offsetHeight));

                    draggedNode.style.left = `${newX}px`;
                    draggedNode.style.top = `${newY}px`;

                    drawLines();
                } else if (isDrawingLine) {
                    updateMousePos(e);
                    drawLines();
                    drawTempLine();
                }
            }
        }, {passive: false});

        // Global Up
        const handleGlobalUp = (e) => {
            if (draggedNode) {
                draggedNode.style.zIndex = 20;
                draggedNode = null;
            }

            if (isDrawingLine) {
                isDrawingLine = false;

                // Find if dropped on a conn-point
                let targetEl = null;
                if (e.type === 'touchend' && e.changedTouches.length > 0) {
                    const touch = e.changedTouches[0];
                    targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                } else {
                    targetEl = document.elementFromPoint(e.clientX, e.clientY);
                }

                if (targetEl && targetEl.classList.contains('conn-point')) {
                    const endNodeId = targetEl.dataset.node;

                    // Don't connect to same node
                    if (startNodeId !== endNodeId) {
                        connections.push({
                            id: Math.random().toString(36).substr(2, 9),
                            fromNode: startNodeId,
                            fromPt: startConnPoint.dataset.pos,
                            toNode: endNodeId,
                            toPt: targetEl.dataset.pos
                        });
                    }
                }

                startConnPoint = null;
                startNodeId = null;
                drawLines();
            }
        };

        window.addEventListener('mouseup', handleGlobalUp);
        window.addEventListener('touchend', handleGlobalUp);

        // --- Rendering ---
        function getPtCoords(nodeId, ptPosClass) {
            const node = document.getElementById(nodeId);
            if (!node) return {x:0, y:0};

            const pt = node.querySelector(`.${ptPosClass}`);
            if (!pt) return {x:0, y:0};

            const ptRect = pt.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            return {
                x: ptRect.left + ptRect.width/2 - containerRect.left,
                y: ptRect.top + ptRect.height/2 - containerRect.top
            };
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            connections.forEach(conn => {
                const start = getPtCoords(conn.fromNode, conn.fromPt);
                const end = getPtCoords(conn.toNode, conn.toPt);

                // Determine color based on node types (simple logic)
                const n1 = document.getElementById(conn.fromNode);
                const n2 = document.getElementById(conn.toNode);
                let color = '#475569'; // default slate
                if (n1.classList.contains('wan') || n2.classList.contains('wan')) color = '#a855f7'; // WAN link
                else if (n1.classList.contains('router') && n2.classList.contains('router')) color = '#ef4444'; // Serial/WAN
                else color = '#3b82f6'; // LAN Eth

                drawLinePath(start, end, color);
            });
        }

        function drawTempLine() {
            if (!startConnPoint) return;
            const start = getPtCoords(startNodeId, startConnPoint.dataset.pos);
            const end = {x: mouseX, y: mouseY};
            drawLinePath(start, end, '#94a3b8', true);
        }

        function drawLinePath(start, end, color, isDashed = false) {
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);

            // Draw a basic curve or straight line. Let's do a smooth bezier based on positions.
            // A simple approach for network diagrams is often orthogonal routing, but bezier is easier here.

            // Calculate control points based roughly on distance
            const dx = Math.abs(end.x - start.x);
            const dy = Math.abs(end.y - start.y);

            // Simple generic curve
            const cp1x = start.x + (end.x - start.x) / 2;
            const cp1y = start.y;
            const cp2x = start.x + (end.x - start.x) / 2;
            const cp2y = end.y;

            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, end.x, end.y);

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;

            if (isDashed) {
                ctx.setLineDash([5, 5]);
            } else {
                ctx.setLineDash([]);
            }

            ctx.stroke();
        }

        document.getElementById('btn-clear-lines').addEventListener('click', () => {
            connections = [];
            drawLines();
        });

        // Start
        window.onload = init;

    </script>
</body>
</html>
