<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b, #0f172a);
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input[type="range"] { accent-color: #4ade80; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <div class="container mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Zurück zur Übersicht
            </a>
        </div>
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-teal-500 mb-4">
                Subnet Calculator
            </h1>
            <p class="text-slate-300 max-w-2xl mx-auto">
                Einfacher Rechner für IPv4 Subnetze.
            </p>
        </div>

        <div class="flex flex-col gap-8 max-w-lg mx-auto items-center w-full">
            <div class="w-full glass-card rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4 text-slate-300 font-semibold">
                    <label>Präfix:</label>
                    <span id="prefixVal" class="text-emerald-400 text-xl font-bold">/24</span>
                </div>
                <input type="range" id="cidr" min="1" max="32" value="24" oninput="calc()" class="w-full mb-8">

                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 space-y-3">
                    <div class="flex justify-between items-center text-slate-300">
                        <span>Maske:</span>
                        <span id="mask" class="text-emerald-400 font-bold mono">255.255.255.0</span>
                    </div>
                    <div class="flex justify-between items-center text-slate-300">
                        <span>Nutzbare Hosts:</span>
                        <span id="hosts" class="text-emerald-400 font-bold mono">254</span>
                    </div>
                    <div class="flex justify-between items-center text-slate-300">
                        <span>Netze (von /24):</span>
                        <span id="subnets" class="text-emerald-400 font-bold mono">1</span>
                    </div>

                    <div class="pt-3 mt-3 border-t border-slate-700/50 text-center">
                        <span id="binMask" class="mono text-sm text-slate-500 tracking-wider">11111111.11111111.11111111.00000000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const p = document.getElementById('cidr').value;
            document.getElementById('prefixVal').innerText = '/' + p;
            
            // Maske berechnen
            let maskArr = [];
            for (let i = 0; i < 4; i++) {
                let n = Math.min(Math.max(p - i * 8, 0), 8);
                maskArr.push(n ? (256 - Math.pow(2, 8 - n)) : 0);
            }
            document.getElementById('mask').innerText = maskArr.join('.');
            
            // Hosts berechnen
            const h = Math.pow(2, 32 - p) - 2;
            document.getElementById('hosts').innerText = h < 0 ? 0 : h.toLocaleString();
            
            // Subnetze (Basis /24)
            const s = p >= 24 ? Math.pow(2, p - 24) : 'N/A';
            document.getElementById('subnets').innerText = s;

            // Binär-Darstellung
            let bin = "";
            for(let i=1; i<=32; i++) {
                bin += i <= p ? "1" : "0";
                if(i % 8 === 0 && i < 32) bin += ".";
            }
            document.getElementById('binMask').innerText = bin;
        }
    </script>
</body>
</html>
