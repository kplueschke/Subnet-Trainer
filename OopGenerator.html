<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOP-Klassen-Generator - AP Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="ap.html" class="p-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors border border-slate-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </a>
                <h1 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="text-blue-400">📦</span> OOP-Klassen-Generator
                </h1>
            </div>
            <div class="text-sm text-slate-400 mono">C# Boilerplate</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8 flex flex-col lg:flex-row gap-6">

        <!-- Controls Panel (Left) -->
        <div class="w-full lg:w-1/2 flex flex-col gap-6">

            <!-- Class Config -->
            <div class="glass-card rounded-2xl p-6">
                <h2 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    Klassendefinition
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Klassenname</label>
                        <input type="text" id="classNameInput" value="Person" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Sichtbarkeit (Class)</label>
                        <select id="classAccessSelect" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
                            <option value="public">public</option>
                            <option value="internal">internal</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Attributes Config -->
            <div class="glass-card rounded-2xl p-6 flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        Eigenschaften (Properties)
                    </h2>
                    <button id="addPropBtn" class="px-3 py-1 bg-green-600/20 text-green-400 hover:bg-green-600/30 rounded-lg text-sm transition-colors border border-green-500/30 flex items-center gap-1">
                        + Hinzufügen
                    </button>
                </div>

                <div id="propertiesContainer" class="space-y-3 overflow-y-auto pr-2 max-h-64">
                    <!-- Property Rows will be added here -->
                </div>
            </div>

            <!-- Methods Config -->
            <div class="glass-card rounded-2xl p-6 flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        Methoden
                    </h2>
                    <button id="addMethodBtn" class="px-3 py-1 bg-purple-600/20 text-purple-400 hover:bg-purple-600/30 rounded-lg text-sm transition-colors border border-purple-500/30 flex items-center gap-1">
                        + Hinzufügen
                    </button>
                </div>

                <div id="methodsContainer" class="space-y-3 overflow-y-auto pr-2 max-h-64">
                    <!-- Method Rows will be added here -->
                </div>
            </div>

        </div>

        <!-- Output Panel (Right) -->
        <div class="w-full lg:w-1/2 flex flex-col">
            <div class="glass-card rounded-2xl p-0 flex flex-col h-full overflow-hidden border-slate-700">
                <div class="bg-slate-800/80 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                    <span class="text-sm font-medium text-slate-300 mono flex items-center gap-2">
                        <svg class="w-4 h-4 text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M24 10.933v2.134h-2.132v2.133h-2.134v2.134h-2.133v2.133H15.47v2.133h-6.936v-2.133H6.402v-2.133H4.268v-2.134H2.134V13.067H0v-2.134h2.134V8.802h2.134V6.668h2.134V4.534h2.133V2.401h6.936v2.133h2.133v2.133h2.133v2.134h2.132v2.133H24zM2.134 10.933v2.134h2.134v2.133h2.134v2.134h2.133v2.133h6.936v-2.133h2.133v-2.134h2.133v-2.133h2.132V10.933h-2.132V8.802h-2.133V6.668h-2.133V4.534H8.535v2.134H6.402v2.134H4.268v2.131H2.134zM10.669 8.802v6.4h2.665v-6.4h-2.665z"/></svg>
                        Generierter C#-Code
                    </span>
                    <button id="copyBtn" class="text-slate-400 hover:text-white transition-colors" title="Code kopieren">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
                <div class="flex-grow p-4 bg-[#0d1117] overflow-auto">
                    <pre><code id="codeOutput" class="mono text-sm text-blue-300 leading-relaxed"></code></pre>
                </div>
            </div>
        </div>

    </main>

    <script>
        // State
        let properties = [
            { id: 1, access: 'public', type: 'string', name: 'Name', getter: true, setter: true },
            { id: 2, access: 'private', type: 'int', name: 'age', getter: false, setter: false }
        ];
        let methods = [
            { id: 1, access: 'public', type: 'void', name: 'Sprechen', params: '' }
        ];
        let propIdCounter = 3;
        let methodIdCounter = 2;

        // DOM Elements
        const classNameInput = document.getElementById('classNameInput');
        const classAccessSelect = document.getElementById('classAccessSelect');
        const propertiesContainer = document.getElementById('propertiesContainer');
        const methodsContainer = document.getElementById('methodsContainer');
        const codeOutput = document.getElementById('codeOutput');
        const addPropBtn = document.getElementById('addPropBtn');
        const addMethodBtn = document.getElementById('addMethodBtn');
        const copyBtn = document.getElementById('copyBtn');

        // Types available
        const types = ['string', 'int', 'double', 'bool', 'DateTime', 'var', 'object'];
        const accessModifiers = ['public', 'private', 'protected', 'internal'];

        function renderProperties() {
            propertiesContainer.innerHTML = '';
            properties.forEach(prop => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 bg-slate-800/50 p-2 rounded-lg border border-slate-700/50';
                div.innerHTML = `
                    <select onchange="updateProp(${prop.id}, 'access', this.value)" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-slate-300 focus:outline-none">
                        ${accessModifiers.map(a => `<option value="${a}" ${prop.access === a ? 'selected' : ''}>${a}</option>`).join('')}
                    </select>
                    <select onchange="updateProp(${prop.id}, 'type', this.value)" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-blue-300 focus:outline-none w-20">
                        ${types.map(t => `<option value="${t}" ${prop.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                    </select>
                    <input type="text" oninput="updateProp(${prop.id}, 'name', this.value)" value="${prop.name}" placeholder="Name" class="flex-grow bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:outline-none">
                    <label class="flex items-center gap-1 text-xs text-slate-400 cursor-pointer">
                        <input type="checkbox" onchange="updateProp(${prop.id}, 'getter', this.checked)" ${prop.getter ? 'checked' : ''} class="rounded border-slate-700 bg-slate-900"> get
                    </label>
                    <label class="flex items-center gap-1 text-xs text-slate-400 cursor-pointer">
                        <input type="checkbox" onchange="updateProp(${prop.id}, 'setter', this.checked)" ${prop.setter ? 'checked' : ''} class="rounded border-slate-700 bg-slate-900"> set
                    </label>
                    <button onclick="removeProp(${prop.id})" class="text-red-400 hover:text-red-300 p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                propertiesContainer.appendChild(div);
            });
            generateCode();
        }

        function renderMethods() {
            methodsContainer.innerHTML = '';
            methods.forEach(method => {
                const div = document.createElement('div');
                div.className = 'flex flex-col gap-2 bg-slate-800/50 p-2 rounded-lg border border-slate-700/50';
                div.innerHTML = `
                    <div class="flex items-center gap-2">
                        <select onchange="updateMethod(${method.id}, 'access', this.value)" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-slate-300 focus:outline-none">
                            ${accessModifiers.map(a => `<option value="${a}" ${method.access === a ? 'selected' : ''}>${a}</option>`).join('')}
                        </select>
                        <select onchange="updateMethod(${method.id}, 'type', this.value)" class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-purple-300 focus:outline-none w-20">
                            <option value="void" ${method.type === 'void' ? 'selected' : ''}>void</option>
                            ${types.map(t => `<option value="${t}" ${method.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                        <input type="text" oninput="updateMethod(${method.id}, 'name', this.value)" value="${method.name}" placeholder="MethodName" class="flex-grow bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white focus:outline-none">
                        <button onclick="removeMethod(${method.id})" class="text-red-400 hover:text-red-300 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-500">(</span>
                        <input type="text" oninput="updateMethod(${method.id}, 'params', this.value)" value="${method.params}" placeholder="string msg, int count..." class="flex-grow bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-slate-300 focus:outline-none">
                        <span class="text-xs text-slate-500">)</span>
                    </div>
                `;
                methodsContainer.appendChild(div);
            });
            generateCode();
        }

        // Actions
        window.updateProp = (id, field, value) => {
            const prop = properties.find(p => p.id === id);
            if (prop) { prop[field] = value; generateCode(); }
        };
        window.removeProp = (id) => {
            properties = properties.filter(p => p.id !== id);
            renderProperties();
        };
        window.updateMethod = (id, field, value) => {
            const method = methods.find(m => m.id === id);
            if (method) { method[field] = value; generateCode(); }
        };
        window.removeMethod = (id) => {
            methods = methods.filter(m => m.id !== id);
            renderMethods();
        };

        addPropBtn.addEventListener('click', () => {
            properties.push({ id: propIdCounter++, access: 'public', type: 'string', name: 'NewProperty', getter: true, setter: true });
            renderProperties();
        });

        addMethodBtn.addEventListener('click', () => {
            methods.push({ id: methodIdCounter++, access: 'public', type: 'void', name: 'NewMethod', params: '' });
            renderMethods();
        });

        classNameInput.addEventListener('input', generateCode);
        classAccessSelect.addEventListener('change', generateCode);

        function generateCode() {
            const className = classNameInput.value || 'MyClass';
            const classAccess = classAccessSelect.value;

            let code = `using System;\nusing System.Collections.Generic;\n\n`;
            code += `${classAccess} class <span class="text-yellow-300">${className}</span>\n{\n`;

            // Fields / Properties
            if (properties.length > 0) {
                properties.forEach(p => {
                    const access = `<span class="text-blue-400">${p.access}</span>`;
                    const type = `<span class="text-teal-300">${p.type}</span>`;
                    const name = `<span class="text-white">${p.name}</span>`;

                    if (p.getter || p.setter) {
                        let accessors = [];
                        if (p.getter) accessors.push('get;');
                        if (p.setter) accessors.push('set;');
                        code += `    ${access} ${type} ${name} { <span class="text-slate-400">${accessors.join(' ')}</span> }\n`;
                    } else {
                        code += `    ${access} ${type} ${name};\n`;
                    }
                });
                code += `\n`;
            }

            // Constructor
            code += `    <span class="text-blue-400">public</span> <span class="text-yellow-300">${className}</span>()\n    {\n        <span class="text-slate-500">// Standardkonstruktor</span>\n    }\n\n`;

            // Methods
            if (methods.length > 0) {
                methods.forEach(m => {
                    const access = `<span class="text-blue-400">${m.access}</span>`;
                    const type = `<span class="text-teal-300">${m.type}</span>`;
                    const name = `<span class="text-yellow-200">${m.name}</span>`;
                    const params = `<span class="text-orange-300">${m.params}</span>`;

                    code += `    ${access} ${type} ${name}(${params})\n    {\n        <span class="text-slate-500">// TODO: Implementierung</span>\n`;
                    if (m.type !== 'void') {
                        code += `        <span class="text-purple-400">return</span> <span class="text-blue-400">default</span>;\n`;
                    }
                    code += `    }\n\n`;
                });
            }

            code += `}`;

            codeOutput.innerHTML = code;
        }

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            const rawCode = codeOutput.innerText; // Get raw text without HTML tags
            navigator.clipboard.writeText(rawCode).then(() => {
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
                }, 2000);
            });
        });

        // Init
        renderProperties();
        renderMethods();
    </script>
</body>
</html>
