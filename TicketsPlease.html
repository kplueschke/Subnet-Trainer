<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets, Please</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        #desk { position: relative; height: 50vh; width: 100%; overflow: hidden; border-radius: 1rem; background: #1e293b url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20zM20 0h20v20H20V0z" fill="rgba(255,255,255,0.02)" fill-rule="evenodd"/></svg>'); }
        .ticket { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 500px; background: #fdfbf7; color: #1e293b; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: 'Fira Code', monospace; transition: transform 0.3s, opacity 0.3s; }
        .ticket.stamped-approve { border: 4px solid #22c55e; }
        .ticket.stamped-reject { border: 4px solid #ef4444; }
        .stamp { position: absolute; font-size: 4rem; font-weight: bold; text-transform: uppercase; border: 4px solid; padding: 0.5rem 1rem; border-radius: 0.5rem; transform: rotate(-15deg); opacity: 0.8; top: 20%; left: 10%; pointer-events: none; }
        .stamp.approve { color: #22c55e; border-color: #22c55e; }
        .stamp.reject { color: #ef4444; border-color: #ef4444; }
        .slide-out-right { transform: translateX(150%) rotate(10deg); opacity: 0; }
        .slide-out-left { transform: translateX(-250%) rotate(-10deg); opacity: 0; }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col">
    <div class="container mx-auto px-4 py-8 max-w-4xl flex-grow flex flex-col">
        <div class="mb-6 flex items-center justify-between">
            <a href="englisch.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-900 hover:bg-slate-700 text-gray-400 transition-colors border border-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Zurück
            </a>
            <h1 class="text-2xl font-bold text-white">"Tickets, Please"</h1>
            <div class="flex gap-4">
                <div class="text-lg font-mono">Time: <span id="time" class="text-yellow-400">01:00</span></div>
                <div class="text-lg font-mono">Score: <span id="score" class="text-gray-400">0</span></div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 mb-6 flex-grow flex flex-col">
            <p class="text-gray-500 mb-4 text-center">Prüfe die englischen Jira-Tickets. <span class="text-green-400">Approve</span>, wenn Grammatik und Vokabular korrekt sind. <span class="text-red-400">Reject</span> bei Fehlern.</p>

            <div class="flex justify-center mb-4 gap-4" id="controls">
                <button id="start-btn" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl transition-colors">Schicht beginnen</button>
            </div>

            <div id="desk" class="flex-grow flex items-center justify-center relative">
                <!-- Ticket will appear here -->
            </div>

            <div class="flex justify-center gap-8 mt-6" id="stamp-buttons" style="display: none;">
                <button id="btn-reject" class="px-8 py-4 bg-red-600/20 hover:bg-red-600/40 border-2 border-red-500 text-red-500 font-bold rounded-xl transition-colors text-xl uppercase tracking-wider">
                    Reject
                </button>
                <button id="btn-approve" class="px-8 py-4 bg-green-600/20 hover:bg-green-600/40 border-2 border-green-500 text-green-500 font-bold rounded-xl transition-colors text-xl uppercase tracking-wider">
                    Approve
                </button>
            </div>
        </div>
    </div>

    <script>
        const tickets = [
            { text: "The server is rebooted yesterday, but it still doesn't work.", isCorrect: false, error: "Tense error: 'was rebooted', not 'is rebooted'." },
            { text: "We have successfully deployed the new patch to the production environment.", isCorrect: true, error: "" },
            { text: "Please send me the files until tomorrow.", isCorrect: false, error: "Vocabulary error: 'by tomorrow', not 'until tomorrow'." },
            { text: "The database migration completed without any data loss.", isCorrect: true, error: "" },
            { text: "I am working on this project since three months.", isCorrect: false, error: "Tense/Prep error: 'I have been working... for three months'." },
            { text: "Could you please clarify the requirements for this feature?", isCorrect: true, error: "" },
            { text: "My computer makes a strange noise when I start it up.", isCorrect: true, error: "" },
            { text: "The network router needs to be replaced as soon as possible.", isCorrect: true, error: "" },
            { text: "We must to fix this bug immediately.", isCorrect: false, error: "Grammar error: 'must fix', no 'to'." },
            { text: "I have written a script that automates the backup process.", isCorrect: true, error: "" }
        ];

        const desk = document.getElementById('desk');
        const timeEl = document.getElementById('time');
        const scoreEl = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const stampBtns = document.getElementById('stamp-buttons');

        let currentTicket = null;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let isPlaying = false;

        function startGame() {
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            scoreEl.innerText = score;
            startBtn.style.display = 'none';
            stampBtns.style.display = 'flex';

            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) endGame();
            }, 1000);

            nextTicket();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timeEl.innerText = `${m}:${s}`;
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            desk.innerHTML = `<div class="text-white text-2xl font-bold">Schicht beendet! Score: ${score}</div>`;
            stampBtns.style.display = 'none';
            startBtn.innerText = 'Neue Schicht';
            startBtn.style.display = 'block';
        }

        function nextTicket() {
            desk.innerHTML = '';
            const tData = tickets[Math.floor(Math.random() * tickets.length)];
            currentTicket = tData;

            const el = document.createElement('div');
            el.className = 'ticket';
            el.innerHTML = `
                <div class="border-b border-gray-300 pb-2 mb-4 flex justify-between text-sm text-gray-500">
                    <span>JIRA-1337</span>
                    <span>High Priority</span>
                </div>
                <h3 class="font-bold text-lg mb-2">Issue Description</h3>
                <p class="text-base">${tData.text}</p>
            `;
            desk.appendChild(el);
        }

        function processDecision(isApproved) {
            if(!isPlaying) return;
            const ticketEl = desk.querySelector('.ticket');

            const isCorrectDecision = (currentTicket.isCorrect === isApproved);

            // Stamp visual
            const stamp = document.createElement('div');
            stamp.className = `stamp ${isApproved ? 'approve' : 'reject'}`;
            stamp.innerText = isApproved ? 'APPROVED' : 'REJECTED';
            ticketEl.appendChild(stamp);

            if(isCorrectDecision) {
                score += 100;
                // Green flash
                desk.style.backgroundColor = 'rgba(34, 197, 94, 0.2)';
            } else {
                score = Math.max(0, score - 50);
                // Red flash
                desk.style.backgroundColor = 'rgba(239, 68, 68, 0.2)';

                // Show error if rejected wrongfully
                if(isApproved && !currentTicket.isCorrect) {
                    alert("Citation issued! " + currentTicket.error);
                }
            }
            scoreEl.innerText = score;

            setTimeout(() => desk.style.backgroundColor = '', 200);

            // Animate out
            setTimeout(() => {
                ticketEl.classList.add(isApproved ? 'slide-out-right' : 'slide-out-left');
                setTimeout(nextTicket, 300);
            }, 500);
        }

        document.getElementById('btn-approve').addEventListener('click', () => processDecision(true));
        document.getElementById('btn-reject').addEventListener('click', () => processDecision(false));
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
