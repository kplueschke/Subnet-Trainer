<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt-Phasen-Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at top, #111111, #000000);
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .draggable {
            cursor: grab;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .droppable.drag-over {
            background-color: rgba(99, 102, 241, 0.2);
            border-style: dashed;
            border-color: #818cf8;
        }
        .phase-container {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col">
    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10 flex-grow">
        <div class="mb-8">
            <a href="bgp.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-900 hover:bg-slate-700 text-gray-400 transition-colors border border-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Zurück zu BGP
            </a>
        </div>

        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-red-500">
                Projekt-Phasen-Navigator
            </h1>
            <p class="mt-4 text-gray-400">Ziehe die Dokumente und Meilensteine in die korrekte Projektphase.</p>
        </div>

        <div class="grid lg:grid-cols-4 gap-6 mb-12">
            <!-- Phase 1: Definition -->
            <div class="glass-card rounded-3xl p-4 flex flex-col droppable border border-gray-700" id="def" ondragover="allowDrop(event)" ondrop="drop(event, 'def')">
                <div class="flex items-center gap-2 mb-2 pb-2 border-b border-gray-700">
                    <div class="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold text-white">1</div>
                    <h3 class="text-lg font-bold text-white">Definition</h3>
                </div>
                <div class="phase-container" id="def-list"></div>
            </div>

            <!-- Phase 2: Planung -->
            <div class="glass-card rounded-3xl p-4 flex flex-col droppable border border-gray-700" id="plan" ondragover="allowDrop(event)" ondrop="drop(event, 'plan')">
                <div class="flex items-center gap-2 mb-2 pb-2 border-b border-gray-700">
                    <div class="w-6 h-6 rounded-full bg-orange-500/20 text-orange-400 border border-orange-500/50 flex items-center justify-center text-xs font-bold">2</div>
                    <h3 class="text-lg font-bold text-orange-400">Planung</h3>
                </div>
                <div class="phase-container" id="plan-list"></div>
            </div>

            <!-- Phase 3: Durchführung -->
            <div class="glass-card rounded-3xl p-4 flex flex-col droppable border border-gray-700" id="do" ondragover="allowDrop(event)" ondrop="drop(event, 'do')">
                <div class="flex items-center gap-2 mb-2 pb-2 border-b border-gray-700">
                    <div class="w-6 h-6 rounded-full bg-cyan-500/20 text-red-400 border border-cyan-500/50 flex items-center justify-center text-xs font-bold">3</div>
                    <h3 class="text-lg font-bold text-red-400">Durchführung</h3>
                </div>
                <div class="phase-container" id="do-list"></div>
            </div>

            <!-- Phase 4: Abschluss -->
            <div class="glass-card rounded-3xl p-4 flex flex-col droppable border border-gray-700" id="end" ondragover="allowDrop(event)" ondrop="drop(event, 'end')">
                <div class="flex items-center gap-2 mb-2 pb-2 border-b border-gray-700">
                    <div class="w-6 h-6 rounded-full bg-green-500/20 text-green-400 border border-green-500/50 flex items-center justify-center text-xs font-bold">4</div>
                    <h3 class="text-lg font-bold text-green-400">Abschluss</h3>
                </div>
                <div class="phase-container" id="end-list"></div>
            </div>
        </div>

        <!-- Document Pool -->
        <div class="glass-card rounded-3xl p-6 border-dashed border-2 border-slate-600 droppable min-h-[150px]" id="pool" ondragover="allowDrop(event)" ondrop="drop(event, 'pool')">
            <h3 class="text-sm uppercase tracking-wider text-slate-500 font-bold mb-4 text-center">Dokumente & Meilensteine</h3>
            <div class="flex flex-wrap justify-center gap-3" id="items-container">
                <!-- Items injected via JS -->
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <button onclick="resetGame()" class="px-6 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 font-medium transition-colors">Zurücksetzen</button>
            <button onclick="checkAnswers()" class="px-6 py-2 rounded-xl bg-orange-600 hover:bg-orange-500 font-bold transition-colors">Überprüfen</button>
        </div>

        <div id="feedback" class="mt-6 text-center font-bold text-lg hidden"></div>
    </div>

    <script>
        const docs = [
            { id: "d1", target: "def", text: "📄 Lastenheft" },
            { id: "d2", target: "def", text: "📝 Projektantrag" },
            { id: "d3", target: "def", text: "🎯 Machbarkeitsstudie" },
            { id: "d4", target: "plan", text: "📄 Pflichtenheft" },
            { id: "d5", target: "plan", text: "📊 Projektstrukturplan (PSP)" },
            { id: "d6", target: "plan", text: "📈 Ressourcen- & Terminplan" },
            { id: "d7", target: "do", text: "🛠️ Programmcode / Implementierung" },
            { id: "d8", target: "do", text: "📊 Statusberichte" },
            { id: "d9", target: "do", text: "🐞 Testprotokolle" },
            { id: "d10", target: "end", text: "🏁 Projektabnahme-Protokoll" },
            { id: "d11", target: "end", text: "📚 Projektdokumentation" },
            { id: "d12", target: "end", text: "🎓 Lessons Learned" }
        ];

        function init() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';

            // Shuffle docs
            const shuffled = [...docs].sort(() => Math.random() - 0.5);

            shuffled.forEach(d => {
                const el = document.createElement('div');
                el.id = d.id;
                el.className = 'draggable px-4 py-2 bg-gray-900 rounded-lg border border-slate-600 text-sm shadow-md hover:border-indigo-400 transition-colors w-max';
                el.draggable = true;
                el.innerText = d.text;
                el.dataset.target = d.target;

                el.addEventListener('dragstart', drag);
                container.appendChild(el);
            });

            ['def-list', 'plan-list', 'do-list', 'end-list'].forEach(id => {
                document.getElementById(id).innerHTML = '';
            });
            document.getElementById('feedback').classList.add('hidden');
        }

        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev, targetId) {
            ev.preventDefault();
            document.querySelectorAll('.droppable').forEach(d => d.classList.remove('drag-over'));

            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);

            if(!draggedElement) return;

            // Remove status classes
            draggedElement.classList.remove('border-green-500', 'border-red-500', 'bg-green-900/30', 'bg-red-900/30');
            draggedElement.classList.add('border-slate-600', 'bg-gray-900');

            if (targetId === 'pool') {
                document.getElementById('items-container').appendChild(draggedElement);
                draggedElement.classList.remove('w-full');
                draggedElement.classList.add('w-max');
            } else {
                document.getElementById(targetId + '-list').appendChild(draggedElement);
                draggedElement.classList.remove('w-max');
                draggedElement.classList.add('w-full');
            }

            document.getElementById('feedback').classList.add('hidden');
        }

        document.querySelectorAll('.droppable').forEach(zone => {
            zone.addEventListener('dragleave', (e) => {
                e.currentTarget.classList.remove('drag-over');
            });
        });

        function checkAnswers() {
            const poolItems = document.getElementById('items-container').children.length;
            const feedback = document.getElementById('feedback');

            if(poolItems > 0) {
                feedback.innerHTML = "⚠️ Bitte ordne zuerst alle Dokumente den Phasen zu.";
                feedback.className = "mt-6 text-center font-bold text-lg text-yellow-400";
                feedback.classList.remove('hidden');
                return;
            }

            let errors = 0;

            const checkList = (listId, expectedTarget) => {
                const list = document.getElementById(listId);
                Array.from(list.children).forEach(item => {
                    item.classList.remove('border-slate-600', 'bg-gray-900');
                    if(item.dataset.target === expectedTarget) {
                        item.classList.add('border-green-500', 'bg-green-900/30');
                    } else {
                        item.classList.add('border-red-500', 'bg-red-900/30');
                        errors++;
                    }
                });
            };

            checkList('def-list', 'def');
            checkList('plan-list', 'plan');
            checkList('do-list', 'do');
            checkList('end-list', 'end');

            feedback.classList.remove('hidden');
            if(errors === 0) {
                feedback.innerHTML = "🎉 Exzellent! Der Projektverlauf ist korrekt abgebildet.";
                feedback.className = "mt-6 text-center font-bold text-lg text-green-400 bg-green-500/10 p-3 rounded-lg border border-green-500/30 w-max mx-auto";
            } else {
                feedback.innerHTML = `❌ ${errors} Fehler. Dokumente mit rotem Rand sind in der falschen Phase.`;
                feedback.className = "mt-6 text-center font-bold text-lg text-red-400 bg-red-500/10 p-3 rounded-lg border border-red-500/30 w-max mx-auto";
            }
        }

        function resetGame() {
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
