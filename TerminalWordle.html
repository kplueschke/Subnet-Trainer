<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Wordle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .terminal { font-family: 'Fira Code', monospace; background-color: #000; border: 1px solid #333; border-radius: 0.5rem; padding: 1rem; color: #22c55e; min-height: 400px; }
        .word-grid { display: grid; gap: 5px; margin-bottom: 20px; }
        .grid-row { display: flex; gap: 5px; justify-content: center; }
        .grid-cell { width: 50px; height: 50px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; color: white; transition: all 0.3s; }
        .cell-correct { background-color: #22c55e; border-color: #22c55e; }
        .cell-present { background-color: #eab308; border-color: #eab308; }
        .cell-absent { background-color: #334155; border-color: #334155; }
        .cell-active { border-color: #64748b; }
        #keyboard { display: flex; flex-direction: column; gap: 8px; align-items: center; margin-top: 20px; }
        .key-row { display: flex; gap: 6px; }
        .key { padding: 10px; min-width: 30px; background: #334155; border-radius: 4px; color: white; cursor: pointer; text-align: center; user-select: none; font-family: 'Fira Code', monospace; }
        .key:active { transform: scale(0.95); }
        .key.correct { background-color: #22c55e; }
        .key.present { background-color: #eab308; }
        .key.absent { background-color: #1e293b; color: #64748b; }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col">
    <div class="container mx-auto px-4 py-8 max-w-4xl flex-grow flex flex-col">
        <div class="mb-6 flex items-center justify-between">
            <a href="englisch.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gray-900 hover:bg-slate-700 text-gray-400 transition-colors border border-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Zurück
            </button>
            <h1 class="text-2xl font-bold text-white">Terminal Wordle</h1>
        </div>

        <div class="glass-card rounded-2xl p-6 flex-grow flex flex-col items-center">

            <div class="terminal w-full max-w-lg mb-6 shadow-2xl shadow-black/50">
                <div class="text-sm mb-4">
                    root@linux-server:~# ./brute_force_login.sh<br>
                    <span class="text-gray-500">Target acquired. IT Dictionary loaded. 6 attempts remaining.</span>
                </div>

                <div id="grid" class="word-grid">
                    <!-- Grid generated by JS -->
                </div>
            </div>

            <div id="keyboard" class="w-full max-w-lg">
                <div class="key-row">
                    <div class="key" data-key="Q">Q</div><div class="key" data-key="W">W</div><div class="key" data-key="E">E</div><div class="key" data-key="R">R</div><div class="key" data-key="T">T</div><div class="key" data-key="Y">Y</div><div class="key" data-key="U">U</div><div class="key" data-key="I">I</div><div class="key" data-key="O">O</div><div class="key" data-key="P">P</div>
                </div>
                <div class="key-row">
                    <div class="key" data-key="A">A</div><div class="key" data-key="S">S</div><div class="key" data-key="D">D</div><div class="key" data-key="F">F</div><div class="key" data-key="G">G</div><div class="key" data-key="H">H</div><div class="key" data-key="J">J</div><div class="key" data-key="K">K</div><div class="key" data-key="L">L</div>
                </div>
                <div class="key-row">
                    <div class="key" data-key="ENTER" style="font-size:0.8em; padding: 12px 8px;">ENT</div>
                    <div class="key" data-key="Z">Z</div><div class="key" data-key="X">X</div><div class="key" data-key="C">C</div><div class="key" data-key="V">V</div><div class="key" data-key="B">B</div><div class="key" data-key="N">N</div><div class="key" data-key="M">M</div>
                    <div class="key" data-key="BACKSPACE" style="font-size:0.8em; padding: 12px 8px;">DEL</div>
                </div>
            </div>

            <div id="message" class="mt-4 font-mono font-bold text-center h-6"></div>

            <button id="restart-btn" class="mt-4 px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-xl transition-colors hidden font-mono">./restart.sh</button>

        </div>
    </div>

    <script>
        const words = ["CACHE", "DEBUG", "PROXY", "QUERY", "STACK", "MACRO", "TOKEN", "VIRUS", "LOGIC", "PIXEL"];
        let targetWord = "";
        const maxGuesses = 6;
        let wordLength = 5;
        let currentGuess = [];
        let currentRow = 0;
        let isGameOver = false;

        const grid = document.getElementById('grid');
        const keyboard = document.getElementById('keyboard');
        const messageEl = document.getElementById('message');
        const restartBtn = document.getElementById('restart-btn');

        function initGame() {
            targetWord = words[Math.floor(Math.random() * words.length)];
            currentGuess = [];
            currentRow = 0;
            isGameOver = false;
            messageEl.innerText = "";
            messageEl.className = "mt-4 font-mono font-bold text-center h-6";
            restartBtn.classList.add('hidden');

            // Clear keyboard styling
            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('correct', 'present', 'absent');
            });

            // Init Grid
            grid.innerHTML = '';
            for(let i=0; i<maxGuesses; i++) {
                const row = document.createElement('div');
                row.className = 'grid-row';
                for(let j=0; j<wordLength; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${i}-${j}`;
                    row.appendChild(cell);
                }
                grid.appendChild(row);
            }
            updateGrid();
        }

        function updateGrid() {
            // Clear current row
            for(let j=0; j<wordLength; j++) {
                const cell = document.getElementById(`cell-${currentRow}-${j}`);
                if(cell) {
                    cell.innerText = currentGuess[j] || "";
                    cell.classList.toggle('cell-active', j === currentGuess.length && !isGameOver);
                }
            }
        }

        function handleKeyPress(key) {
            if(isGameOver) return;

            if (key === 'ENTER') {
                if (currentGuess.length === wordLength) {
                    submitGuess();
                } else {
                    showMessage("Word too short", "text-red-500");
                }
            } else if (key === 'BACKSPACE' || key === 'DELETE') {
                currentGuess.pop();
                updateGrid();
            } else if (/^[A-Z]$/.test(key) && currentGuess.length < wordLength) {
                currentGuess.push(key);
                updateGrid();
            }
        }

        function submitGuess() {
            const guessString = currentGuess.join("");

            // Note: In real wordle we'd check if word is in dictionary here

            const targetArr = targetWord.split("");
            const guessArr = [...currentGuess];
            const cellColors = Array(wordLength).fill('absent');

            // Find correct letters first
            for(let i=0; i<wordLength; i++) {
                if(guessArr[i] === targetArr[i]) {
                    cellColors[i] = 'correct';
                    targetArr[i] = null; // consume letter
                    guessArr[i] = null;
                }
            }

            // Find present letters
            for(let i=0; i<wordLength; i++) {
                if(guessArr[i] !== null && targetArr.includes(guessArr[i])) {
                    cellColors[i] = 'present';
                    targetArr[targetArr.indexOf(guessArr[i])] = null; // consume
                }
            }

            // Animate and apply colors
            for(let i=0; i<wordLength; i++) {
                setTimeout(() => {
                    const cell = document.getElementById(`cell-${currentRow}-${i}`);
                    cell.classList.add(`cell-${cellColors[i]}`);

                    // Update keyboard
                    const keyEl = document.querySelector(`.key[data-key="${currentGuess[i]}"]`);
                    if(keyEl) {
                        // don't downgrade from correct to present
                        if(!keyEl.classList.contains('correct')) {
                            keyEl.classList.remove('present', 'absent');
                            keyEl.classList.add(cellColors[i]);
                        }
                    }

                    // Check win/loss after last animation
                    if(i === wordLength - 1) {
                        if (guessString === targetWord) {
                            showMessage("Access Granted.", "text-green-500");
                            isGameOver = true;
                            restartBtn.classList.remove('hidden');
                        } else if (currentRow === maxGuesses - 1) {
                            showMessage(`Access Denied. Password was ${targetWord}`, "text-red-500");
                            isGameOver = true;
                            restartBtn.classList.remove('hidden');
                        } else {
                            currentRow++;
                            currentGuess = [];
                            updateGrid();
                        }
                    }
                }, i * 300);
            }
        }

        function showMessage(msg, colorClass) {
            messageEl.innerText = msg;
            messageEl.className = `mt-4 font-mono font-bold text-center h-6 ${colorClass}`;
            setTimeout(() => { if(!isGameOver) messageEl.innerText = ""; }, 2000);
        }

        // Event Listeners
        document.addEventListener('keydown', (e) => {
            handleKeyPress(e.key.toUpperCase());
        });

        document.querySelectorAll('.key').forEach(k => {
            k.addEventListener('click', (e) => {
                handleKeyPress(e.target.dataset.key);
            });
        });

        restartBtn.addEventListener('click', initGame);

        // Start
        initGame();

    </script>
</body>
</html>
