<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall-Regel-Türsteher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at top, #111111, #000000);
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        #game-area {
            position: relative;
            height: 400px;
            background: repeating-linear-gradient(
                90deg,
                rgba(15, 23, 42, 0.5),
                rgba(15, 23, 42, 0.5) 40px,
                rgba(30, 41, 59, 0.5) 40px,
                rgba(30, 41, 59, 0.5) 80px
            );
            border-radius: 1rem;
            overflow: hidden;
            border: 2px dashed rgba(99, 102, 241, 0.3);
        }

        .packet {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            transition: left 0.1s linear;
            z-index: 10;
        }

        .firewall-wall {
            position: absolute;
            right: 120px;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(to bottom, rgba(239, 68, 68, 0.8), rgba(220, 38, 38, 0.8));
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            z-index: 5;
        }

        .firewall-wall.allow {
            background: linear-gradient(to bottom, rgba(34, 197, 94, 0.8), rgba(22, 163, 74, 0.8));
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex flex-col">

    <div class="container mx-auto px-4 py-8 flex-grow flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <a href="its.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Zurück
            </button>
            <div class="text-xl font-bold font-mono text-blue-400">Score: <span id="score">0</span></div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-red-400 to-orange-500 mb-2">
                Firewall-Regel-Türsteher
            </h1>
            <p class="text-gray-400">Entscheide innerhalb von Sekunden: ALLOW oder DROP basierend auf der ACL.</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow">

            <!-- ACL Rules -->
            <div class="w-full lg:w-1/3 glass-card rounded-3xl p-6 flex flex-col h-full">
                <h2 class="text-xl font-bold text-white mb-4">Active ACL</h2>
                <div class="bg-black rounded-xl p-4 mono text-sm flex-grow overflow-y-auto border border-gray-700">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-slate-500 border-b border-gray-700">
                                <th class="pb-2">ID</th>
                                <th class="pb-2">Proto</th>
                                <th class="pb-2">Port</th>
                                <th class="pb-2 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="acl-table" class="text-gray-400">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Game Area -->
            <div class="w-full lg:w-2/3 flex flex-col gap-4">

                <div id="game-area" class="w-full shadow-2xl shadow-indigo-500/10">
                    <div class="firewall-wall" id="firewall"></div>

                    <!-- Start Overlay -->
                    <div id="start-screen" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-20 backdrop-blur-sm">
                        <h2 class="text-2xl font-bold text-white mb-4">Bereit?</h2>
                        <p class="text-gray-400 mb-8 max-w-md text-center">Ein IP-Paket nähert sich. Du hast nur kurz Zeit, die ACL zu prüfen und zu entscheiden.</p>
                        <button id="btn-start" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition-all transform hover:scale-105">
                            Spiel Starten
                        </button>
                    </div>

                    <!-- Game Over Overlay -->
                    <div id="game-over-screen" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-20 backdrop-blur-sm hidden">
                        <h2 class="text-3xl font-bold text-red-500 mb-2">Game Over!</h2>
                        <p class="text-xl text-white mb-6">Dein Score: <span id="final-score" class="font-bold text-blue-400">0</span></p>
                        <button id="btn-restart" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl transition-all">
                            Nochmal spielen
                        </button>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex gap-4">
                    <button id="btn-drop" disabled class="flex-1 py-4 bg-red-600 hover:bg-red-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold text-xl rounded-xl transition-colors shadow-lg shadow-red-600/20">
                        DROP (Blockieren)
                    </button>
                    <button id="btn-allow" disabled class="flex-1 py-4 bg-green-600 hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold text-xl rounded-xl transition-colors shadow-lg shadow-green-600/20">
                        ALLOW (Durchlassen)
                    </button>
                </div>

                <!-- Timer Bar -->
                <div class="w-full h-2 bg-gray-900 rounded-full overflow-hidden">
                    <div id="timer-bar" class="h-full bg-blue-500 w-full" style="transition: width 0.1s linear;"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const aclRules = [
            { id: 10, proto: 'TCP', port: 80, action: 'ALLOW', class: 'text-green-400' },
            { id: 20, proto: 'TCP', port: 443, action: 'ALLOW', class: 'text-green-400' },
            { id: 30, proto: 'TCP', port: 22, action: 'DROP', class: 'text-red-400' },
            { id: 40, proto: 'UDP', port: 53, action: 'ALLOW', class: 'text-green-400' },
            { id: 50, proto: 'ICMP', port: 'ANY', action: 'DROP', class: 'text-red-400' },
            { id: 99, proto: 'ANY', port: 'ANY', action: 'DROP', class: 'text-red-400' } // Implicit Deny
        ];

        // Generate Packets based on ACL to ensure playability
        const possiblePackets = [
            { proto: 'TCP', port: 80, expected: 'ALLOW' },
            { proto: 'TCP', port: 443, expected: 'ALLOW' },
            { proto: 'TCP', port: 22, expected: 'DROP' },
            { proto: 'UDP', port: 53, expected: 'ALLOW' },
            { proto: 'ICMP', port: '-', expected: 'DROP' },
            { proto: 'TCP', port: 3389, expected: 'DROP' }, // hits rule 99
            { proto: 'UDP', port: 123, expected: 'DROP' }   // hits rule 99
        ];

        let score = 0;
        let gameInterval;
        let currentPacketEl = null;
        let packetPos = 0; // percentage
        let packetSpeed = 0.5; // percentage per tick (approx 50 ticks per sec)
        let isPlaying = false;
        let currentExpectedAction = '';

        const gameArea = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');
        const btnAllow = document.getElementById('btn-allow');
        const btnDrop = document.getElementById('btn-drop');
        const firewall = document.getElementById('firewall');
        const timerBar = document.getElementById('timer-bar');

        // Init ACL Table
        const tbody = document.getElementById('acl-table');
        aclRules.forEach(rule => {
            tbody.innerHTML += `
                <tr class="border-b border-gray-800">
                    <td class="py-2">${rule.id}</td>
                    <td>${rule.proto}</td>
                    <td>${rule.port}</td>
                    <td class="text-right font-bold ${rule.class}">${rule.action}</td>
                </tr>
            `;
        });

        function spawnPacket() {
            if (currentPacketEl) {
                currentPacketEl.remove();
            }

            const pData = possiblePackets[Math.floor(Math.random() * possiblePackets.length)];
            currentExpectedAction = pData.expected;

            currentPacketEl = document.createElement('div');
            currentPacketEl.className = 'packet bg-gray-900 border-2 border-slate-600 p-3 rounded-lg shadow-lg flex flex-col items-center justify-center mono text-xs';
            currentPacketEl.innerHTML = `
                <span class="text-blue-400 font-bold mb-1">${pData.proto}</span>
                <span class="text-gray-400">Port: ${pData.port}</span>
            `;

            packetPos = 0;
            currentPacketEl.style.left = '0%';
            gameArea.appendChild(currentPacketEl);

            // Enable buttons
            btnAllow.disabled = false;
            btnDrop.disabled = false;

            firewall.className = 'firewall-wall'; // reset color
        }

        function gameLoop() {
            if (!isPlaying) return;

            packetPos += packetSpeed;

            if (currentPacketEl) {
                currentPacketEl.style.left = `${packetPos}%`;
            }

            // Update timer bar visualization (time remaining until firewall hit)
            // Firewall is approx at 90% width
            const remaining = Math.max(0, 100 - (packetPos / 90 * 100));
            timerBar.style.width = `${remaining}%`;

            if (remaining < 30) {
                timerBar.className = 'h-full bg-red-500 w-full';
            } else if (remaining < 60) {
                timerBar.className = 'h-full bg-orange-500 w-full';
            } else {
                timerBar.className = 'h-full bg-blue-500 w-full';
            }

            if (packetPos >= 90) { // Hit the firewall
                handleDecision('TIMEOUT');
            }
        }

        function handleDecision(userAction) {
            btnAllow.disabled = true;
            btnDrop.disabled = true;

            if (userAction === currentExpectedAction) {
                // Correct!
                score += 100;
                scoreEl.textContent = score;

                // Visual feedback
                if (userAction === 'ALLOW') {
                    firewall.classList.add('allow');
                    currentPacketEl.style.left = '120%'; // fly through
                } else {
                    currentPacketEl.style.transform = 'translateY(-50%) scale(0)';
                    currentPacketEl.style.opacity = '0';
                }

                // Increase speed slightly
                packetSpeed += 0.02;

                setTimeout(spawnPacket, 500); // Spawn next after delay
            } else {
                // Wrong or Timeout -> Game Over
                endGame();
            }
        }

        function startGame() {
            score = 0;
            packetSpeed = 0.4;
            scoreEl.textContent = score;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            isPlaying = true;
            spawnPacket();

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 20); // 50 fps
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            document.getElementById('final-score').textContent = score;
            gameOverScreen.classList.remove('hidden');
            btnAllow.disabled = true;
            btnDrop.disabled = true;
        }

        btnStart.addEventListener('click', startGame);
        btnRestart.addEventListener('click', startGame);

        btnAllow.addEventListener('click', () => handleDecision('ALLOW'));
        btnDrop.addEventListener('click', () => handleDecision('DROP'));

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'd') {
                if(!btnDrop.disabled) handleDecision('DROP');
            }
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'a') {
                if(!btnAllow.disabled) handleDecision('ALLOW');
            }
        });

    </script>
</body>
</html>
