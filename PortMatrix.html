<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port-Zuordnungs-Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overscroll-behavior: none;
        }
        .mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 1rem;
            border: 2px dashed rgba(148, 163, 184, 0.2);
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to nodes if needed, we handle drawing via container */
            z-index: 10;
        }

        .node {
            position: absolute;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            color: white;
            user-select: none;
            cursor: crosshair;
            z-index: 20;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        .node:hover {
            transform: scale(1.05);
            border-color: #6366f1;
        }

        .node.service {
            left: 10%;
        }

        .node.port {
            right: 10%;
            font-family: 'Fira Code', monospace;
            color: #38bdf8;
        }

        .node.connected-correct {
            border-color: #22c55e !important;
            background: rgba(34, 197, 94, 0.2);
        }

        .node.connected-wrong {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.2);
        }

        .connector-point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #cbd5e1;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            border: 2px solid #0f172a;
        }

        .service .connector-point { right: -6px; }
        .port .connector-point { left: -6px; }

    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <a href="its.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Zurück
            </a>
            <div class="flex gap-4">
                <button id="btn-check" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg shadow-lg shadow-indigo-500/30 transition-colors">
                    Prüfen
                </button>
                <button id="btn-reset" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg transition-colors">
                    Reset
                </button>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500 mb-4">
                Port-Zuordnungs-Matrix
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto">
                Verbinde die bekannten Dienste auf der linken Seite mit den korrekten Standard-Portnummern auf der rechten Seite durch Ziehen von Linien.
            </p>
        </div>

        <div class="glass-card rounded-2xl p-6 max-w-5xl mx-auto">
            <div id="canvas-container">
                <canvas id="lines-canvas"></canvas>
                <!-- Nodes generated by JS -->
            </div>

            <div id="result-msg" class="mt-6 text-center text-xl font-bold h-8 hidden"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full text-center py-6 border-t border-slate-900 text-xs text-slate-600 mono mt-8">
        &copy; 2026 kplueschke All rights reserved.
    </footer>

    <script>
        const mappings = [
            { id: 'ftp', srv: 'FTP (Data/Control)', port: '20, 21' },
            { id: 'ssh', srv: 'SSH', port: '22' },
            { id: 'telnet', srv: 'Telnet', port: '23' },
            { id: 'smtp', srv: 'SMTP', port: '25' },
            { id: 'dns', srv: 'DNS', port: '53' },
            { id: 'dhcp', srv: 'DHCP', port: '67, 68' },
            { id: 'http', srv: 'HTTP', port: '80' },
            { id: 'pop3', srv: 'POP3', port: '110' },
            { id: 'imap', srv: 'IMAP', port: '143' },
            { id: 'https', srv: 'HTTPS', port: '443' },
            { id: 'rdp', srv: 'RDP', port: '3389' }
        ];

        // Select a subset for the game to keep it visually clean
        const subsetSize = 6;
        let activeNodes = [];

        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('lines-canvas');
        const ctx = canvas.getContext('2d');
        const resultMsg = document.getElementById('result-msg');

        // Drawing State
        let isDrawing = false;
        let startNode = null;
        let mouseX = 0;
        let mouseY = 0;
        let connections = []; // { sourceId, targetId }

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawAll();
        }

        window.addEventListener('resize', resizeCanvas);

        function initGame() {
            container.querySelectorAll('.node').forEach(n => n.remove());
            connections = [];
            resultMsg.classList.add('hidden');

            // Pick random subset
            const shuffled = [...mappings].sort(() => 0.5 - Math.random());
            activeNodes = shuffled.slice(0, subsetSize);

            // Separate and shuffle services and ports independently
            const services = [...activeNodes].sort(() => 0.5 - Math.random());
            const ports = [...activeNodes].sort(() => 0.5 - Math.random());

            // Create DOM elements
            services.forEach((item, index) => {
                createNode(item, index, 'service');
            });

            ports.forEach((item, index) => {
                createNode(item, index, 'port');
            });

            resizeCanvas();
        }

        function createNode(item, index, type) {
            const el = document.createElement('div');
            el.className = `node ${type}`;
            el.dataset.id = item.id;
            el.dataset.type = type;

            if(type === 'service') el.textContent = item.srv;
            else el.textContent = item.port;

            // Connector dot
            const dot = document.createElement('div');
            dot.className = 'connector-point';
            el.appendChild(dot);

            // Positioning vertically evenly spaced
            const spacing = 100 / (subsetSize + 1);
            el.style.top = `${spacing * (index + 1)}%`;
            el.style.transform = `translateY(-50%)`;

            container.appendChild(el);

            // Event Listeners for drawing
            el.addEventListener('mousedown', handleNodeMouseDown);
            // Touch support
            el.addEventListener('touchstart', (e) => {
                e.preventDefault(); // prevent scrolling
                handleNodeMouseDown(e.touches[0], el);
            }, {passive: false});
        }

        function handleNodeMouseDown(e, elementOverride) {
            const target = elementOverride || this;
            isDrawing = true;
            startNode = target;
            updateMousePos(e);

            // Remove existing connection from this node if any
            connections = connections.filter(c => c.sourceId !== target.dataset.id && c.targetId !== target.dataset.id);

            // Reset styles
            document.querySelectorAll('.node').forEach(n => {
                n.classList.remove('connected-correct', 'connected-wrong');
            });
            resultMsg.classList.add('hidden');

            drawAll();
        }

        function updateMousePos(e) {
            const rect = container.getBoundingClientRect();
            mouseX = (e.clientX || e.pageX) - rect.left;
            mouseY = (e.clientY || e.pageY) - rect.top;
        }

        container.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            updateMousePos(e);
            drawAll();
            drawTempLine();
        });

        container.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            updateMousePos(e.touches[0]);
            drawAll();
            drawTempLine();
        }, {passive: false});

        container.addEventListener('mouseup', handleGlobalMouseUp);
        container.addEventListener('touchend', handleGlobalMouseUp);

        function handleGlobalMouseUp(e) {
            if (!isDrawing) return;
            isDrawing = false;

            // Find if mouse is over a node
            // For mouse events:
            let targetNode = null;

            if (e.type === 'touchend') {
                const touch = e.changedTouches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                if (el && el.closest('.node')) targetNode = el.closest('.node');
            } else {
                const el = document.elementFromPoint(e.clientX, e.clientY);
                if (el && el.closest('.node')) targetNode = el.closest('.node');
            }

            if (targetNode && targetNode !== startNode && targetNode.dataset.type !== startNode.dataset.type) {
                // Valid connection
                connections.push({
                    sourceId: startNode.dataset.type === 'service' ? startNode.dataset.id : targetNode.dataset.id,
                    targetId: startNode.dataset.type === 'port' ? startNode.dataset.id : targetNode.dataset.id
                });
            }

            startNode = null;
            drawAll();
        }

        function getConnectorCoords(node) {
            const rect = node.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            const dot = node.querySelector('.connector-point');
            const dotRect = dot.getBoundingClientRect();

            return {
                x: dotRect.left + dotRect.width/2 - containerRect.left,
                y: dotRect.top + dotRect.height/2 - containerRect.top
            };
        }

        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw finalized connections
            connections.forEach(conn => {
                const sourceEl = document.querySelector(`.node.service[data-id="${conn.sourceId}"]`);
                const targetEl = document.querySelector(`.node.port[data-id="${conn.targetId}"]`);

                if (sourceEl && targetEl) {
                    const start = getConnectorCoords(sourceEl);
                    const end = getConnectorCoords(targetEl);

                    drawLineCurve(start.x, start.y, end.x, end.y, '#94a3b8');
                }
            });
        }

        function drawTempLine() {
            if (!startNode) return;
            const start = getConnectorCoords(startNode);
            drawLineCurve(start.x, start.y, mouseX, mouseY, '#6366f1');
        }

        function drawLineCurve(x1, y1, x2, y2, color) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            // Bezier curve for nice flow
            const controlOffset = Math.abs(x2 - x1) / 2;
            ctx.bezierCurveTo(x1 + controlOffset, y1, x2 - controlOffset, y2, x2, y2);

            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        document.getElementById('btn-reset').addEventListener('click', initGame);

        document.getElementById('btn-check').addEventListener('click', () => {
            let allCorrect = true;
            let totalChecked = 0;

            document.querySelectorAll('.node').forEach(n => n.classList.remove('connected-correct', 'connected-wrong'));

            connections.forEach(conn => {
                totalChecked++;
                const sourceEl = document.querySelector(`.node.service[data-id="${conn.sourceId}"]`);
                const targetEl = document.querySelector(`.node.port[data-id="${conn.targetId}"]`);

                if (conn.sourceId === conn.targetId) {
                    sourceEl.classList.add('connected-correct');
                    targetEl.classList.add('connected-correct');
                } else {
                    sourceEl.classList.add('connected-wrong');
                    targetEl.classList.add('connected-wrong');
                    allCorrect = false;
                }
            });

            resultMsg.classList.remove('hidden');

            if (totalChecked < subsetSize) {
                resultMsg.textContent = "Bitte verbinde alle Dienste!";
                resultMsg.className = "mt-6 text-center text-xl font-bold h-8 text-yellow-500";
            } else if (allCorrect) {
                resultMsg.textContent = "Perfekt! Alle Ports sind korrekt zugeordnet. 🎉";
                resultMsg.className = "mt-6 text-center text-xl font-bold h-8 text-green-500";
            } else {
                resultMsg.textContent = "Einige Zuordnungen sind falsch. Versuche es nochmal!";
                resultMsg.className = "mt-6 text-center text-xl font-bold h-8 text-red-500";
            }
        });

        // Start
        window.onload = initGame;

    </script>
</body>
</html>
